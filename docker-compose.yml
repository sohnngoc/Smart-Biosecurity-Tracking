version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2.0.15
    container_name: biosecurity_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mqtt/data:/mosquitto/data
      - ./mqtt/log:/mosquitto/log
    restart: always
